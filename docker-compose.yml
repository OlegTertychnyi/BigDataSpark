services:
  postgres:
    image: postgres:16
    container_name: bds_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - "./исходные данные:/data:ro"
    networks:
      - bds_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: bds-spark:3.5.3 
    container_name: bds_spark_master
    restart: unless-stopped
    user: root
    # Явный запуск master'а вместо дефолтного entrypoint
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host 0.0.0.0
      --port 7077
      --webui-port 8080
    environment:
      - SPARK_NO_DAEMONIZE=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    ports:
      - "${SPARK_MASTER_WEBUI_PORT}:8080"
      - "${SPARK_MASTER_PORT}:7077"
      - "4040:4040"
    volumes:
      - ./scripts:/opt/spark-jobs:ro
      - ./sql:/opt/sql:ro
    networks:
      - bds_net
    depends_on:
      postgres:
        condition: service_healthy

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: bds-spark:3.5.3   
    container_name: bds_spark_worker
    restart: unless-stopped
    user: root
    # Явный запуск worker'а, подключение к master по имени сервиса
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --webui-port 8081
      spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
    ports:
      - "${SPARK_WORKER_WEBUI_PORT}:8081"
    volumes:
      - ./scripts:/opt/spark-jobs:ro
    networks:
      - bds_net
    depends_on:
      - spark-master

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: bds_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT}:8123"
      - "${CLICKHOUSE_NATIVE_PORT}:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
    networks:
      - bds_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  pg_data:
  ch_data:

networks:
  bds_net:
    driver: bridge